<html>
    <head>
        <title>Oldgram - A photo uploader</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header>
            <img class="app-logo" src="images/logo.png" alt="logo icon of oldgram">
            <img class="user-avatar" src="images/user-avatar.png" alt="avatar or profile picture of the instagram's user.">
        </header>
        <main>
            <section class="section1">
                <div class="section1-group">
                    <img id="profile" src="images/avatar-courbet.jpg" alt="profile avatar of courbet instagram account.">
                    <div class="name-location">
                        <name><strong>Gustave Courbet</strong></name>
                        <address>Zundert, Netherlands</address>
                    </div>
                </div>
            </section>
            <section class="section2">
                <img id="click-post" src="images/post-courbet.jpg" alt="A painting of a person with long hair holding is head in shock with eyes wide open.">
            </section>
            <section class="section3">
                    <div class="btn-container">
                        <div role="button" type="button" id="like-btn"><img id="heart" src="images/icon-heart.png" alt="Heart icon, when clicked likes the photo."></div>
                        <div role="button" type="button" id="comment-btn"><img id="comment" src="images/icon-comment.png" alt="Comment icon, when clicked adds a comment."></div>
                        <div role="button" type="button" id="dm-btn"><img id="dm" src="images/icon-dm.png" alt="DM icon, when clicked sends the post as a message."></div>
                    </div>
                <div class="likes"><p><strong id="like-num">25360</strong> likes</p></div>
                <div class="description"><p><strong>gus1819</strong> I'm feelin a bit stressed tbh...</p></div>
                <div id="container"></div>
            </section>


            
        </main>
        
        <script src="node.js"></script>
    </body>
</html>
